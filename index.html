<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高德地图多点规划工具</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: "7ab0ed26880ef99bbf68311a88796ca0",
    };
  </script>
  <!-- Amap JS API - Replace YOUR_AMAP_API_KEY with your actual key from https://lbs.amap.com/ -->
  <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=44abb82d7e642da458d0d24b6a5a4f42"></script>
  <!-- Amap UI Library -->
  <script type="text/javascript" src="https://webapi.amap.com/ui/1.1/main.js"></script>
  <style>
    @media (max-width: 1024px) {
      .flex.h-full {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .w-\[30\%\],
      .w-\[40\%\] {
        width: 100% !important;
      }

      .w-\[40\%\] {
        min-height: 500px;
        order: -1;
      }

      .border-l,
      .border-r {
        border: none !important;
        border-top: 1px solid #e5e7eb !important;
      }
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-gray-50">
  <!-- 3 Column Layout -->
  <div class="flex h-full">
    <!-- Left Column: Location Input Panel -->
    <div class="w-[30%] h-full border-r border-gray-200 bg-white p-4 overflow-y-auto">
      <h2 class="text-xl font-bold mb-4 text-gray-800">我的地点</h2>

      <!-- My Locations List -->
      <div id="myLocationsList" class="space-y-2">
        <!-- Locations will be dynamically added here -->
      </div>

      <div class="mt-6 pt-4 border-t border-gray-200 text-xs text-gray-500">
        <p>💡 点击地图上的 POI 即可收藏到我的地点</p>
      </div>
    </div>

    <!-- Middle Column: Map View -->
    <div class="w-[40%] h-full relative">
      <!-- Map Search Bar -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-md">
        <input id="mapSearchInput"
          class="w-full p-3 rounded-lg shadow-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="搜索城市、地点、景区...">
      </div>

      <!-- Map Container -->
      <div id="mapContainer" class="w-full h-full"></div>
    </div>

    <!-- Right Column: Path Planning Panel -->
    <div class="w-[30%] h-full border-l border-gray-200 bg-white p-4 overflow-y-auto">
      <h2 class="text-xl font-bold mb-4 text-gray-800">路径规划</h2>

      <!-- Selected Destination Info -->
      <div id="destinationDisplay" class="mb-4 p-3 bg-red-50 rounded-lg border border-red-200 hidden">
        <h3 class="font-semibold text-red-800 mb-1">📍 目的地</h3>
        <p id="destName" class="text-sm font-medium text-gray-800"></p>
        <p id="destAddr" class="text-xs text-gray-500 mt-1"></p>
      </div>

      <!-- Transport Mode Switch Bar -->
      <div id="modeSwitchBar" class="flex space-x-1 mb-4">
        <!-- Mode buttons rendered by route.js -->
      </div>

      <!-- Path Results -->
      <div id="routeResultsList" class="space-y-2">
        <p class="text-sm text-gray-500 italic">点击地图 POI 并设为目的地以计算路线</p>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
