<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高德地图多点规划工具</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: "7ab0ed26880ef99bbf68311a88796ca0",
    };
  </script>
  <!-- Amap JS API - Replace YOUR_AMAP_API_KEY with your actual key from https://lbs.amap.com/ -->
  <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=44abb82d7e642da458d0d24b6a5a4f42"></script>
  <!-- Amap UI Library -->
  <script type="text/javascript" src="https://webapi.amap.com/ui/1.1/main.js"></script>
  <style>
    /* Resizable sidebar handles */
    .resize-handle {
      width: 5px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
      transition: background-color 0.15s;
    }
    .resize-handle:hover,
    .resize-handle.active {
      background-color: #3b82f6;
    }
    body.resizing {
      cursor: col-resize !important;
      user-select: none;
    }
    body.resizing * {
      cursor: col-resize !important;
      user-select: none;
    }

    /* POI info window close button */
    .poi-info-close-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #9ca3af;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      background: #f3f4f6;
      border: none;
      line-height: 1;
    }
    .poi-info-close-btn:hover {
      background: #e5e7eb;
      color: #4b5563;
    }

    @media (max-width: 1024px) {
      .flex.h-full {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .resize-handle {
        display: none;
      }

      #leftPanel,
      #rightPanel {
        width: 100% !important;
      }

      #rightPanel {
        min-height: 500px;
        order: -1;
      }

      .border-l,
      .border-r {
        border: none !important;
        border-top: 1px solid #e5e7eb !important;
      }
    }

    /* Amap native route detail panel styling */
    #routeDetailPanel .amap-call {
      background-color: #009cf9;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
    }
    #routeDetailPanel .amap-lib-transfer,
    #routeDetailPanel .amap-lib-driving,
    #routeDetailPanel .amap-lib-walking,
    #routeDetailPanel .amap-lib-riding {
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
      overflow: hidden;
    }
    #routeDetailPanel .amap-lib-transfer .plan-title {
      font-size: 14px;
    }

    /* --- Map Controls Styling --- */

    /* ToolBar - zoom + location buttons */
    .amap-toolbar {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      border: 1px solid #e5e7eb;
    }
    .amap-toolbar .amap-toolbar-btn {
      transition: background-color 0.15s;
    }
    .amap-toolbar .amap-toolbar-btn:hover {
      background-color: #f3f4f6;
    }

    /* MapType - layer switcher, positioned bottom-right above toolbar */
    .amap-maptype {
       transform: translate(-10px, -115px) !important; 
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
      border: 1px solid #e5e7eb;
      font-size: 12px;
      background: white;
    }
    .amap-maptype .amap-ctrl-list-layer {
      border-radius: 6px;
      overflow: hidden;
    }
    .amap-maptype .amap-maptype-control-item {
      transition: background-color 0.15s;
    }
    .amap-maptype .amap-maptype-control-item:hover {
      background-color: #f3f4f6;
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-gray-50">
  <!-- 3 Column Layout -->
  <div id="mainLayout" class="flex h-full">
    <!-- Left Column: location Input Panel -->
    <div id="leftPanel" class="h-full border-r border-gray-200 bg-white p-4 overflow-y-auto" style="width: 240px; flex-shrink: 0;">
      <h2 class="text-xl font-bold mb-4 text-gray-800">我的地点</h2>
  
      <!-- My Locations List -->
      <div id="myLocationsList" class="space-y-2">
        <!-- Locations will be dynamically added here -->
      </div>
  
      <button id="clearAllLocationsBtn" class="w-full mt-3 px-3 py-2 text-sm text-red-500 border border-red-200 rounded-lg hover:bg-red-50 transition-colors">
        清空所有地点
      </button>

      <div class="mt-6 pt-4 border-t border-gray-200 text-xs text-gray-500">
        <p>💡 右键点击地图上的地点即可收藏到我的地点</p>
      </div>
    </div>
  
    <!-- Left Resize Handle -->
    <div id="leftResizeHandle" class="resize-handle"></div>
  
    <!-- Middle Column: Map View -->
    <div id="centerPanel" class="h-full relative" style="flex: 1; min-width: 200px;">
      <!-- Map Search Bar -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-md">
        <input id="mapSearchInput"
          class="w-full p-3 rounded-lg shadow-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="搜索城市、地点、景区...">
      </div>
  
      <!-- Map Container -->
      <div id="mapContainer" class="w-full h-full relative">
        <!-- Route Detail Panel (floating on map, uses Amap native panel for all modes) -->
        <div id="routeDetailPanelWrapper" class="absolute top-4 right-4 z-20 hidden" style="width: 280px;">
          <div class="flex items-center justify-between mb-1 px-1">
            <span id="routeDetailPanelTitle" class="text-xs text-gray-500 truncate"></span>
            <button id="routeDetailPanelClose" class="text-gray-400 hover:text-gray-600 text-xs px-1 transition-colors" title="关闭">✕ 关闭</button>
          </div>
          <div id="routeDetailPanel" class="bg-white rounded-lg shadow-xl overflow-hidden" style="max-height: 70vh; overflow-y: auto;"></div>
        </div>
      </div>
    </div>
  
    <!-- Right Resize Handle -->
    <div id="rightResizeHandle" class="resize-handle"></div>
  
    <!-- Right Column: Path Planning Panel -->
    <div id="rightPanel" class="h-full border-l border-gray-200 bg-white p-4 overflow-y-auto" style="width: 420px; flex-shrink: 0;">
      <h2 class="text-xl font-bold mb-4 text-gray-800">路径规划</h2>

      <!-- Selected Destination Info -->
      <div id="destinationDisplay" class="mb-4 p-3 bg-red-50 rounded-lg border border-red-200 hidden">
        <h3 class="font-semibold text-red-800 mb-1">📍 目的地</h3>
        <p id="destName" class="text-sm font-medium text-gray-800"></p>
        <p id="destAddr" class="text-xs text-gray-500 mt-1"></p>
      </div>

      <!-- Transport Mode Switch Bar -->
      <div id="modeSwitchBar" class="flex space-x-1 mb-4">
        <!-- Mode buttons rendered by route.js -->
      </div>

      <!-- Path Results -->
      <div id="routeResultsList" class="space-y-2">
        <p class="text-sm text-gray-500 italic">点击地图 POI 并设为目的地以计算路线</p>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
